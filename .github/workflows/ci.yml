name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NEXT_PUBLIC_APP_URL: "http://localhost:3000"
  NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || 'https://placeholder.supabase.co' }}
  NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY || 'placeholder' }}
  SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY || 'placeholder' }}

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run lint

      - run: npm run typecheck

      - run: npm run test

      - run: npm run build

  playwright:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: validate

    if: secrets.NEXT_PUBLIC_SUPABASE_URL != '' && secrets.SUPABASE_SECRET_KEY != ''

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium

      - name: Start application
        run: |
          npm start &> /tmp/next.log &
          npx wait-on http://localhost:3000 --timeout 30000

      - name: Run Playwright tests
        run: npx playwright test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/

  release-gates:
    runs-on: ubuntu-latest
    needs: [validate, playwright]
    if: always()

    steps:
      - run: |
          echo "validate: ${{ needs.validate.result }}"
          echo "playwright: ${{ needs.playwright.result }}"
          if [ "${{ needs.validate.result }}" != "success" ]; then
            echo "❌ validate failed"
            exit 1
          fi
          if [ "${{ needs.playwright.result }}" != "success" ] && [ "${{ needs.playwright.result }}" != "skipped" ]; then
            echo "❌ playwright failed"
            exit 1
          fi
          echo "✅ All release gates passed"
